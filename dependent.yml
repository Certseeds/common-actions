# Upstream dependency manifest for common-actions
version: 1

actions:
  # checkout
  checkout:
    upstream: actions/checkout
    ref: v7.0.0

  # setup
  setup-node:
    upstream: actions/setup-node
    ref: v6.4.0

  setup-go:
    upstream: actions/setup-go
    ref: v6.4.0

  setup-pnpm:
    upstream: pnpm/action-setup
    ref: v6.0.9

  setup-uv:
    upstream: astral-sh/setup-uv
    ref: v8.2.0

  setup-rust:
    upstream: dtolnay/rust-toolchain
    ref: v1

  setup-buildx:
    upstream: docker/setup-buildx-action
    ref: v4.1.0

  setup-pandoc:
    upstream: r-lib/actions/setup-pandoc
    ref: v2

  # cache
  cache:
    upstream: actions/cache
    ref: v5.0.5

  cache-rust:
    upstream: Swatinem/rust-cache
    ref: v2.9.1

  # build
  build-go-binary:
    upstream: goreleaser/goreleaser-action
    ref: v7.2.2

  # login
  login-docker:
    upstream: docker/login-action
    ref: v4.2.0

  # upload
  upload-artifact:
    upstream: actions/upload-artifact
    ref: v7.0.1

  upload-pages-artifact:
    upstream: actions/upload-pages-artifact
    ref: v5.0.0

  # deploy
  deploy-pages:
    upstream: actions/deploy-pages
    ref: v5.0.0

  wrangler:
    upstream: cloudflare/wrangler-action
    ref: v4.0.0

  deploy-docker:
    upstream: docker/build-push-action
    ref: v7.2.0

  deploy-npm:
    upstream: JS-DevTools/npm-publish
    ref: v4.1.5
